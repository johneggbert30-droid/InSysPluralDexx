services:
  - type: web
    name: ispd7-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    disk:
      name: ispd7-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ispd7-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATA_DIR
        value: /var/data/ispd7

databases:
  - name: ispd7-db
    databaseName: ispd7
    user: ispd7
